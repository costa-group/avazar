name = "corellzk2smt"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["corellzk2smt_cli"]

[leanOptions]
pp.unicode.fun = true                 # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
weak.linter.style.header = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0-rc1"


[[lean_lib]]
name = "Corellzk2smt"

[[lean_exe]]
name = "corellzk2smt_cli"
root = "Main"
